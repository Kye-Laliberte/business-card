<!DOCTYPE html>
<html lang="en">
<head>
    <link href="borders-Style.css"rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
</head>
<body>
<div class="blog-post-card">
  <img 
    class="post-img" 
    src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" 
    alt="Beautiful landscape"
  >
  <div class="post-content">
    <h2 class="post-title">Exploring the Great Outdoors</h2>
    <p class="post-excerpt">
      Discover the beauty of untouched nature, from rolling hills to crystal-clear rivers. Here's why you should spend more time outside.
    </p>
    <a href="#" class="read-more">Read More</a>
  </div>
</div>
</body>
</html>
